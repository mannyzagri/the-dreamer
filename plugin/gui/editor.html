<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Dreamer — Editor</title>

  <!-- Fonts are bundled LOCALLY (Google Fonts is CSP-blocked in the plugin WebView).
       @font-face rules live in style.css and point at ./fonts/*.ttf — ship those TTFs
       alongside these files. See README_INTEGRATION.md §Fonts. -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- app.js mounts the 1140×660 panel into #root -->
  <div id="root"></div>

  <!-- Bootstrap order for the JUCE WebView (contract §5):
       1) check_native_interop.js  — JUCE's classic pre-script that installs window.__JUCE__
       2) a module that imports the relay frontend, exposes window.Juce, then loads app.js
       When __JUCE__ is absent (plain browser QA) app.js falls back to its in-memory mock. -->
  <script src="js/check_native_interop.js"></script>
  <script type="module">
    try {
      const Juce = await import("./js/index.js");   // juce_gui_extra frontend relays
      window.Juce = Juce;
    } catch (e) { /* no JUCE backend (browser QA) — app.js uses its mock */ }
    import("./app.js");
  </script>
</body>
</html>
