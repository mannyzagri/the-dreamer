<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>The Dreamer</title>
<link rel="stylesheet" href="style.css">
</head><body>

<!-- Fixed 1140x660 design canvas, uniformly scaled by app.js fit().
     Static skeleton only: repetitive controls (knobs, sliders, matrix/FX
     rows, tone columns, LFO rows, faceplate finish) are built by app.js
     into the mount points below (house pattern, see rubber-rhino gui). -->
<div id="frame">
  <div id="panel">

    <!-- ============ header: logo / preset steppers / main LCD / MASTER ==== -->
    <div id="hdr">
      <div id="logo">
        <div id="logoName">THE DREAMER</div>
        <div id="logoSub">12-BIT ROM VECTOR SYNTHESIZER</div>
      </div>
      <div id="lcdWrap">
        <div id="pstep">
          <div class="pstepbtn" id="presetUp">&#9650;</div>
          <div class="pstepbtn" id="presetDn">&#9660;</div>
        </div>
        <div id="mainLcd">
          <div id="waveGlyph"></div>
          <div id="lcdLines">
            <div id="lcdRow1"><span id="presetLbl"></span><span id="lcdTone">TONE A</span></div>
            <div id="lcdRow2"><span id="lcdTouched"></span><span id="lcdMeter"></span></div>
          </div>
        </div>
      </div>
      <!-- v8: MIDI LEARN (visual-only; feature deferred, no CC map / no native call) -->
      <div id="midiCol">
        <div class="led" id="midiLed"></div>
        <div class="midiBtn" id="midiBtn">MIDI</div>
        <div class="midiLab">LEARN</div>
      </div>
      <!-- v8: stereo L/R output meters (peak-hold, fed by window.uiMeters) -->
      <div id="meters">
        <div class="meterCol"><div class="meterBar"><div class="meterFill" id="meterFillL"></div></div><div class="meterLbl">L</div></div>
        <div class="meterCol"><div class="meterBar"><div class="meterFill" id="meterFillR"></div></div><div class="meterLbl">R</div></div>
      </div>
      <div id="masterMount"></div>
      <div id="powerWrap">
        <div class="led on big"></div>
        <div class="plab">POWER</div>
      </div>
    </div>

    <!-- ============ row 1: TONES (mixer) / TONE EDIT / FILTERS ============ -->
    <div id="row1">

      <div class="group" id="gTones">
        <div class="gtitle">TONES</div>
        <div id="toneCols"></div>
      </div>

      <div class="group" id="gToneEdit">
        <div class="gtitle">TONE EDIT&nbsp; <span id="editToneName">A</span></div>
        <div class="terow">
          <div class="plbl">WAVE</div>
          <div class="lcd" id="waveLcd" style="width:170px;height:20px;padding:0 6px"></div>
          <div class="step" id="waveDec">&lt;</div>
          <div class="step" id="waveInc">&gt;</div>
          <div style="width:14px"></div>
          <div class="plbl">SHAPE</div>
          <div class="lcd ctr" id="shapeLcd" style="width:96px;height:20px"></div>
          <div class="step" id="shapeDec">&lt;</div>
          <div class="step" id="shapeInc">&gt;</div>
        </div>
        <div id="teKnobs"></div>
        <div id="teTvfRow">
          <div id="tvfVert">TVF</div>
          <div id="tvfTypeCol">
            <div class="lcd ctr sm" id="tvfTypeLcd" style="width:36px;height:18px"></div>
            <div class="plab7" style="letter-spacing:.08em">TYPE</div>
          </div>
          <div id="tvfKnobs"></div>
          <div class="bankdiv"></div>
          <div class="bank" id="bankTvf"></div>
          <div class="bankdiv"></div>
          <div class="bank" id="bankTva"></div>
          <div class="bankdiv"></div>
          <div class="bank" id="bankAux"></div>
        </div>
        <div class="lfor" id="lfo1Row"></div>
        <div class="lfor" id="lfo2Row"></div>
        <div class="lfor" id="auxEnvRow"></div>
      </div>

      <div class="group" id="gFilters">
        <div class="gtitle">FILTERS</div>
        <div class="fstrip">
          <div class="fnum">1</div>
          <div class="step" id="f1Dec">&lt;</div>
          <div class="lcd ctr sm" id="f1Lcd" style="height:20px"></div>
          <div class="step" id="f1Inc">&gt;</div>
        </div>
        <div class="fknobs" id="f1Knobs"></div>
        <div id="fDivider"></div>
        <div class="fstrip">
          <div class="fnum">2</div>
          <div class="step" id="f2Dec">&lt;</div>
          <div class="lcd ctr sm" id="f2Lcd" style="height:20px"></div>
          <div class="step" id="f2Inc">&gt;</div>
        </div>
        <div class="fknobs" id="f2Knobs"></div>
        <div id="routeRow">
          <div class="ledlbl"><div class="led" id="serLed"></div><div class="plab8">SER</div></div>
          <div class="pbtn" id="routeBtn" style="width:34px;height:18px"></div>
          <div class="ledlbl"><div class="led" id="parLed"></div><div class="plab8">PAR</div></div>
          <div id="fbalMount"></div>
        </div>
      </div>
    </div>

    <!-- ============ row 2: DREAM VECTOR / MOD MATRIX / FX ============ -->
    <div id="row2">

      <div class="group" id="gVector">
        <div class="gtitle">DREAM VECTOR</div>
        <div id="vecLeft">
          <div id="flowBox"><svg id="flowSvg" viewBox="0 0 150 132"></svg></div>
          <div id="flowCap">SIGNAL FLOW &middot; PHASE</div>
          <div class="togrow">
            <div class="plab8" style="letter-spacing:.08em">SHAPE</div>
            <div class="step stepn" id="orbitShapeDec">&lt;</div>
            <div class="cbtn" id="orbitShapeBtn" style="width:36px;height:16px"></div>
            <div class="step stepn" id="orbitShapeInc">&gt;</div>
          </div>
        </div>
        <div id="vecRight">
          <div id="phaseMount"></div>
          <div id="rateMount"></div>
          <div class="togrow"><div class="led" id="orbitLed"></div><div class="pbtn tog" id="orbitBtn"></div><div class="plab7">ORBIT</div></div>
          <div class="togrow"><div class="led" id="penvLed"></div><div class="pbtn tog" id="penvBtn"></div><div class="plab7" style="white-space:nowrap">P-ENV</div></div>
          <div class="togrow"><div class="cbtn" id="penvEditBtn" style="width:40px;height:14px">EDIT</div></div>
        </div>
        <div id="vecDiv"></div>
        <div id="vecTones"></div>
      </div>

      <div class="group" id="gMatrix">
        <div class="gtitle">MOD MATRIX</div>
        <div id="mtxRows" style="display:flex;flex-direction:column;gap:5px"></div>
        <div id="glfoRow">
          <div class="bttl">GLOBAL LFO</div>
          <div id="glfoRateMount"></div>
          <div class="step stepn" id="glfoWaveDec">&lt;</div>
          <div class="cbtn" id="glfoWaveBtn" style="width:40px"></div>
          <div class="step stepn" id="glfoWaveInc">&gt;</div>
        </div>
      </div>

      <div class="group" id="gFx">
        <div class="gtitle">FX</div>
        <div id="fxRows" style="display:flex;flex-direction:column;gap:6px"></div>
      </div>
    </div>

    <!-- version/build stamp, filled by the getInfo native call -->
    <div id="verStamp"></div>

    <!-- faceplate finish overlays (built by app.js): seeded star-field
         variant (off by default) + brushed-metal finish (default ON) -->
    <div id="stars"></div>
    <div id="plate"></div>

    <!-- v8 window resize grip: visual affordance (15x15, diagonal lines).
         The native plugin window is the authoritative resize; drag = cosmetic
         in-page zoom composed with fit(), double-click returns to pure fit. -->
    <div id="grip" title="Drag to resize &middot; double-click resets"></div>
  </div>

  <!-- ============ menu overlay (scrim + LCD page) ============ -->
  <div id="menuOverlay">
    <div id="menuBox">
      <div id="menuHead"><span id="menuTitle"></span><span>ESC=EXIT</span></div>
      <div id="menuList" class="lcd-scroll"></div>
    </div>
  </div>

  <!-- ============ P-ENV mini page (small LCD page on scrim) ============ -->
  <div id="penvOverlay">
    <div id="penvBox">
      <div id="penvHead"><span>P-ENV &mdash; VECTOR PHASE ENVELOPE</span><span>ESC=EXIT</span></div>
      <div id="penvKnobs"></div>
      <div id="penvLoopRow">
        <div class="led big" id="penvLoopLed"></div>
        <div class="pbtn tog" id="penvLoopBtn" style="width:34px;height:22px"></div>
        <div class="plab7">LOOP</div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body></html>
