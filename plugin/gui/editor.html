<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Dreamer</title>
  <link rel="stylesheet" href="style.css">
  <!-- JUCE native-integration bootstrap. check_native_interop.js MUST load
       before app.js: in the plugin it hands over the real window.__JUCE__;
       offline (headless Chrome) it installs the placeholder that makes every
       bridge call harmless. A missing module silently kills all page JS
       (CLAUDE-WORKFLOW s4), so this reference and app.js's import of index.js
       are load-bearing -- both files ship in the CMake binary-data list. -->
  <script src="check_native_interop.js"></script>
</head>
<body>
  <!-- The one scaled frame (screws, faceplate, controls, key bed, overlays
       all live inside it and scale together). app.js builds the entire tree
       from the v13 master geometry and drives fit() from the window size. -->
  <div id="frame"></div>

  <!-- app.js is a module; it imports ./index.js (the JUCE frontend relay
       library). Both stay in juce_add_binary_data. -->
  <script type="module" src="app.js"></script>
</body>
</html>
