<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Dreamer</title>
  <!-- Fonts are bundled locally via @font-face in style.css (Google Fonts is
       CSP-blocked in the plugin WebView). style.css also carries the whole
       design-token + component sheet (v15 production face). -->
  <link rel="stylesheet" href="style.css">
  <!-- check_native_interop.js MUST load first (classic script): in the plugin it
       hands over the real window.__JUCE__; headless it installs a harmless
       placeholder. A missing module silently kills all page JS (workflow s4). -->
  <script src="check_native_interop.js"></script>
</head>
<body>
  <!-- app.js builds the locked 1140x660 panel into #root and scales it. It reads
       window.Juce (the juce_gui_extra relay module) when present, else a mock. -->
  <div id="root"></div>
  <script type="module">
    import * as Juce from "./index.js";
    window.Juce = Juce;            // app.js reads window.Juce for the relays
    import("./app.js");            // load once, after Juce is in place
  </script>
</body>
</html>
